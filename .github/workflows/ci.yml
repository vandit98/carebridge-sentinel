name: carebridge-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile
        run: python -m compileall -q carebridge_sentinel tests scripts
      - name: Unit tests
        run: pytest -q
      - name: PHI/token scan
        run: python scripts/phi_scan.py
      - name: MCP end-to-end smoke
        run: python scripts/e2e_mcp_smoke.py
