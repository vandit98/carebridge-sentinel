services:
  - type: web
    name: carebridge-sentinel
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn carebridge_sentinel.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CAREBRIDGE_SYNTHETIC_FHIR
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"
